<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NADHIR — Protocole Athlétique 15 ans</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
--bg:#080c10;--bg2:#0d1318;--bg3:#111820;--bg4:#0a0f14;
--glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);--glass3:rgba(255,255,255,0.09);
--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
--green:#00e676;--green2:#00c853;--green3:#69f0ae;
--amber:#ffb300;--amber2:#ff8f00;--amber3:#ffe57f;
--red:#ff5252;--red2:#c62828;--blue:#40c4ff;--blue2:#0091ea;
--purple:#ce93d8;
--text:#e8edf2;--text2:#8fa0b0;--text3:#4a5a6a;--text4:#2a3a4a;
--glow-g:0 0 24px rgba(0,230,118,0.35);--glow-a:0 0 24px rgba(255,179,0,0.35);
--glow-r:0 0 24px rgba(255,82,82,0.35);
--r:16px;--r2:12px;--r3:8px;
--nav-h:70px;--top-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:
radial-gradient(ellipse 70% 50% at 15% 5%,rgba(0,230,118,0.045) 0%,transparent 65%),
radial-gradient(ellipse 60% 70% at 85% 90%,rgba(255,179,0,0.04) 0%,transparent 65%),
radial-gradient(ellipse 40% 40% at 70% 20%,rgba(64,196,255,0.025) 0%,transparent 60%);
pointer-events:none;z-index:0;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--text4);border-radius:10px;}

#app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;}

/* ── TOPBAR ── */
#topbar{
flex-shrink:0;height:var(--top-h);
background:rgba(8,12,16,0.93);backdrop-filter:blur(24px);
border-bottom:1px solid var(--border);
display:flex;align-items:center;justify-content:space-between;
padding:0 12px;z-index:100;gap:8px;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:5px;
background:linear-gradient(90deg,var(--green),var(--amber));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:3px;margin-top:-4px;display:block;}

#snc-widget{
display:flex;align-items:center;gap:8px;
background:var(--glass2);border:1px solid var(--border);
border-radius:24px;padding:5px 12px;cursor:pointer;
transition:all .2s;user-select:none;
}
#snc-widget:hover{border-color:var(--green);box-shadow:var(--glow-g);}
.snc-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.snc-dot.pulse{animation:dotpulse 2s infinite;}
@keyframes dotpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.snc-label{font-size:10px;color:var(--text3);letter-spacing:1px;}
.snc-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green);}
.snc-ok .snc-dot{background:var(--green);}
.snc-warn .snc-dot{background:var(--amber);}
.snc-bad .snc-dot{background:var(--red);}
.snc-ok .snc-val{color:var(--green);}
.snc-warn .snc-val{color:var(--amber);}
.snc-bad .snc-val{color:var(--red);}

/* ── BADGE EXPORT CLOUD ── */
#cloud-btn{
position:relative;display:flex;align-items:center;gap:5px;
background:var(--glass2);border:1px solid var(--border);
border-radius:24px;padding:5px 10px;cursor:pointer;
transition:all .2s;font-size:14px;flex-shrink:0;
}
#cloud-btn:hover{border-color:var(--blue);box-shadow:0 0 14px rgba(64,196,255,.3);}
#cloud-badge{
position:absolute;top:-4px;right:-4px;
background:var(--red);color:#fff;border-radius:50%;
width:14px;height:14px;font-size:8px;font-weight:700;
display:none;align-items:center;justify-content:center;
border:2px solid var(--bg);
}
#cloud-badge.show{display:flex;}
#cloud-btn .cloud-lbl{font-size:10px;color:var(--text3);}

/* ── NAV ── */
#nav{
flex-shrink:0;height:var(--nav-h);
background:rgba(8,12,16,0.96);backdrop-filter:blur(24px);
border-top:1px solid var(--border);
display:flex;justify-content:space-around;align-items:center;
z-index:100;padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
display:flex;flex-direction:column;align-items:center;gap:2px;
padding:8px 10px;border-radius:10px;cursor:pointer;
transition:all .2s;border:none;background:transparent;
color:var(--text3);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.5px;
min-width:50px;
}
.nav-btn .ni{font-size:20px;transition:all .2s;}
.nav-btn:hover{color:var(--text2);}
.nav-btn.active{color:var(--green);}
.nav-btn.active .ni{filter:drop-shadow(0 0 5px var(--green));}

/* ── MAIN ── */
#main{flex:1 1 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.tab-pane{display:none;padding:14px 14px 100px;animation:fadein .3s;}
.tab-pane.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ── CARDS ── */
.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;backdrop-filter:blur(12px);}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2.5px;color:var(--amber);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-green{border-color:rgba(0,230,118,0.15);background:linear-gradient(135deg,rgba(0,230,118,0.04),rgba(255,179,0,0.02));}
.card-red{border-color:rgba(255,82,82,0.25);background:rgba(255,82,82,0.04);}
.card-blue{border-color:rgba(64,196,255,0.18);background:rgba(64,196,255,0.03);}

/* ── BANDEAU DÉCISION DU JOUR ── */
.decision-banner{
display:flex;align-items:center;gap:10px;
padding:11px 14px;border-radius:12px;margin-bottom:12px;
font-size:12px;font-weight:600;line-height:1.4;
border:1px solid;
}
.dec-ok{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.3);color:var(--green);}
.dec-warn{background:rgba(255,179,0,.08);border-color:rgba(255,179,0,.3);color:var(--amber);}
.dec-bad{background:rgba(255,82,82,.08);border-color:rgba(255,82,82,.3);color:var(--red);}
.dec-icon{font-size:20px;flex-shrink:0;}
.dec-content{flex:1;}
.dec-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;margin-bottom:2px;}
.dec-sub{font-size:10px;opacity:.8;font-weight:400;}

/* ── EX CARD AJUSTÉE ── */
.ex-item{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);}
.ex-item:last-child{border-bottom:none;}
.ex-item.ex-adjusted{background:rgba(0,230,118,.04);border-radius:8px;padding:9px 8px;margin:2px -8px;}
.ex-item.ex-reduced{background:rgba(255,179,0,.04);border-radius:8px;padding:9px 8px;margin:2px -8px;}
.ex-item.ex-cancelled{opacity:.45;}
.ex-adj-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700;margin-top:3px;}
.ex-adj-up{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3);}
.ex-adj-down{background:rgba(255,179,0,.15);color:var(--amber);border:1px solid rgba(255,179,0,.3);}
.ex-adj-std{background:rgba(64,196,255,.12);color:var(--blue);border:1px solid rgba(64,196,255,.2);}

/* ── WIDGET NUTRITION ── */
.nutri-widget{
background:linear-gradient(135deg,rgba(64,196,255,.06),rgba(0,230,118,.04));
border:1px solid rgba(64,196,255,.2);
border-radius:var(--r2);padding:14px;margin-bottom:14px;
}
.nutri-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--blue);margin-bottom:10px;}
.nutri-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.nutri-box{text-align:center;background:var(--glass2);border-radius:8px;padding:8px 4px;}
.nutri-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;line-height:1;}
.nutri-lbl{font-size:9px;color:var(--text3);margin-top:3px;letter-spacing:.5px;}
.nutri-phase{font-size:10px;color:var(--text2);margin-top:8px;text-align:center;}

/* ── CLOUD SYNC PANEL ── */
#cloud-popup{position:fixed;top:68px;right:14px;width:310px;background:var(--bg2);border:1px solid rgba(64,196,255,.3);border-radius:var(--r);padding:18px;z-index:120;display:none;animation:slidedn .25s;box-shadow:0 16px 50px rgba(0,0,0,.5);}
#cloud-popup.show{display:block;}
.cloud-section{margin-bottom:12px;}
.cloud-section-title{font-size:10px;color:var(--blue);letter-spacing:1px;font-weight:700;margin-bottom:7px;}

/* ── DAILY CARD ── */
.daily-card{background:linear-gradient(135deg,rgba(0,230,118,0.08),rgba(255,179,0,0.05));border:1px solid rgba(0,230,118,0.3);border-radius:var(--r);padding:18px;margin-bottom:14px;position:relative;overflow:hidden;}
.daily-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(0,230,118,0.12),transparent 70%);border-radius:50%;pointer-events:none;}
.daily-card.cancelled{background:linear-gradient(135deg,rgba(255,82,82,0.08),rgba(255,82,82,0.03));border-color:rgba(255,82,82,0.3);}
.daily-card.cancelled::after{background:radial-gradient(circle,rgba(255,82,82,0.12),transparent 70%);}
.daily-greeting{font-size:11px;color:var(--text3);letter-spacing:1px;margin-bottom:4px;}
.daily-day{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--green);line-height:1;}
.daily-seance{font-size:14px;font-weight:600;color:var(--text);margin-top:6px;}
.daily-snc{font-size:11px;color:var(--text2);margin-top:4px;}
.daily-alert{font-size:12px;color:var(--red);font-weight:600;margin-top:6px;}
.daily-info{font-size:11px;color:var(--amber);margin-top:4px;}

/* ── MESO DOTS ── */
.meso-dots{display:flex;gap:6px;align-items:center;margin:10px 0;}
.meso-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid transparent;transition:all .2s;flex-shrink:0;cursor:default;}
.meso-dot.prep{background:rgba(0,230,118,0.15);color:var(--green);border-color:rgba(0,230,118,0.3);}
.meso-dot.charge{background:rgba(255,179,0,0.15);color:var(--amber);border-color:rgba(255,179,0,0.3);}
.meso-dot.pic{background:rgba(255,82,82,0.15);color:var(--red);border-color:rgba(255,82,82,0.3);}
.meso-dot.dech{background:rgba(100,100,100,0.15);color:var(--text3);border-color:rgba(100,100,100,0.3);}
.meso-dot.current{width:38px;height:38px;font-size:12px;font-weight:900;box-shadow:0 0 18px currentColor;animation:mesogl 2s infinite alternate;}
@keyframes mesogl{0%{transform:scale(1);}100%{transform:scale(1.08);}}

/* ── PHASE BANNER ── */
.phase-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;margin-bottom:14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;}
.phase-prep{background:rgba(0,230,118,0.12);border:1px solid rgba(0,230,118,0.3);color:var(--green);}
.phase-charge{background:rgba(255,179,0,0.12);border:1px solid rgba(255,179,0,0.3);color:var(--amber);}
.phase-pic{background:rgba(255,82,82,0.12);border:1px solid rgba(255,82,82,0.3);color:var(--red);}
.phase-dech{background:rgba(100,100,100,0.1);border:1px solid rgba(100,100,100,0.2);color:var(--text3);}
.phase-hiv{background:rgba(64,196,255,0.12);border:1px solid rgba(64,196,255,0.3);color:var(--blue);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;}
.bg{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.ba{background:rgba(255,179,0,.12);color:var(--amber);border:1px solid rgba(255,179,0,.2);}
.br{background:rgba(255,82,82,.12);color:var(--red);border:1px solid rgba(255,82,82,.2);}
.bb{background:rgba(64,196,255,.12);color:var(--blue);border:1px solid rgba(64,196,255,.2);}
.bp{background:rgba(206,147,216,.12);color:var(--purple);border:1px solid rgba(206,147,216,.2);}
.bdim{background:var(--glass2);color:var(--text3);border:1px solid var(--border);}

/* ── PROGRESS ── */
.prog-wrap{margin:8px 0;}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px;}
.prog-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.pf-g{background:linear-gradient(90deg,var(--green2),var(--green));}
.pf-a{background:linear-gradient(90deg,var(--amber2),var(--amber));}
.pf-b{background:linear-gradient(90deg,var(--blue2),var(--blue));}
.pf-r{background:linear-gradient(90deg,var(--red2),var(--red));}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-box{background:var(--glass2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:24px;color:var(--green);font-weight:700;line-height:1;}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:5px;letter-spacing:.5px;}
.stat-sub{font-size:9px;color:var(--text3);margin-top:3px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;}
.btn-g{background:linear-gradient(135deg,var(--green2),var(--green));color:#000;box-shadow:0 3px 12px rgba(0,230,118,.3);}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(0,230,118,.4);}
.btn-g:active{transform:translateY(0);}
.btn-a{background:linear-gradient(135deg,var(--amber2),var(--amber));color:#000;box-shadow:0 3px 12px rgba(255,179,0,.3);}
.btn-r{background:linear-gradient(135deg,var(--red2),var(--red));color:#fff;}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-o:hover{border-color:var(--green);color:var(--green);}
.btn-b{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#000;}
.btn-sm{padding:6px 13px;font-size:11px;border-radius:8px;}
.btn-full{width:100%;justify-content:center;}

/* ── INPUTS ── */
.ig{margin-bottom:13px;}
.il{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:.5px;}
.inp{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:9px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,230,118,.1);}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
select.inp option{background:var(--bg2);}

/* ── WEEK SLIDER ── */
.week-slider-wrap{margin:10px 0 14px;}
.week-slider-row{display:flex;align-items:center;gap:8px;}
.week-slider-wrap input[type=range]{flex:1;-webkit-appearance:none;height:6px;background:rgba(255,255,255,.08);border-radius:10px;outline:none;}
.week-slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--green2),var(--green));cursor:pointer;box-shadow:var(--glow-g);}
.week-num-badge{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--green);font-weight:700;min-width:36px;text-align:center;background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:4px 8px;}

.div{height:1px;background:var(--border);margin:12px 0;}

/* ── EX-ITEM ── */
.ex-name{font-size:13px;font-weight:500;}
.ex-det{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--amber);}
.ex-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.charge-big{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--amber);display:block;margin-top:3px;}

.hr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;}
.hr:last-child{border-bottom:none;}
.hr-date{color:var(--text3);font-size:10px;font-family:'JetBrains Mono',monospace;}

/* ── PILLS ── */
.pill-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.pill{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:transparent;color:var(--text2);letter-spacing:.5px;}
.pill.ap{background:var(--amber);color:#000;border-color:var(--amber);}
.pill.ag{background:var(--green);color:#000;border-color:var(--green);}

.coudes-alert{display:flex;align-items:center;gap:10px;background:rgba(255,82,82,0.08);border:1px solid rgba(255,82,82,0.35);border-radius:10px;padding:10px 14px;margin-bottom:12px;}
.coudes-dot{width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0;animation:dotpulse 1.5s infinite;}
.coudes-txt{font-size:11px;color:var(--red);font-weight:600;}

.cm{background:linear-gradient(135deg,rgba(0,230,118,.05),rgba(255,179,0,.04));border:1px solid rgba(0,230,118,.18);border-radius:12px;padding:14px;margin-bottom:12px;position:relative;}
.cm::before{content:'🤖';font-size:18px;position:absolute;top:-10px;left:14px;background:var(--bg2);padding:0 4px;}
.cm p{font-size:12px;line-height:1.75;color:var(--text);}
.cm .ct{font-size:9px;color:var(--text3);margin-top:7px;}
.cm-alert{background:rgba(255,82,82,.06);border-color:rgba(255,82,82,.25);}
.cm-alert::before{content:'⚠️';}
.cm-warn{background:rgba(255,179,0,.06);border-color:rgba(255,179,0,.25);}
.cm-warn::before{content:'💡';}

.sug{background:var(--glass2);border:1px solid rgba(64,196,255,.2);border-radius:12px;padding:14px;margin-bottom:10px;}
.sug-title{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:5px;}
.sug-body{font-size:11px;color:var(--text2);line-height:1.6;}
.sug-foot{display:flex;gap:7px;margin-top:10px;}

.timeline{position:relative;padding-left:26px;}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--green),var(--amber),transparent);}
.tl-item{position:relative;margin-bottom:18px;}
.tl-dot{position:absolute;left:-23px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg);box-shadow:var(--glow-g);}
.tl-dot.da{background:var(--amber);box-shadow:var(--glow-a);}
.tl-dot.dd{background:var(--text4);box-shadow:none;}
.tl-y{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--text3);}
.tl-title{font-size:13px;font-weight:600;color:var(--text);margin-top:1px;}
.tl-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.tl-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
.tl-item-clickable{cursor:pointer;transition:opacity .15s;}
.tl-item-clickable:hover{opacity:.8;}
.tl-item-clickable .tl-y{text-decoration:underline dotted rgba(255,179,0,.4);}

// MODIFICATION 3 : PROJECTIONS LOGARITHMIQUES
// ═══════════════════════════════════════════════════════════════

/**
* Projection logarithmique du 100m (décroissant)
* depart : temps de départ (ex: 12.65s)
* cible : temps cible (ex: 10.80s)
* anneesTotales : sur combien d'années (ex: 8)
* annee : année demandée (1..N)
*/
function projectSprintLog(depart, cible, anneesTotales, annee){
if(annee<=0) return depart;
const a=clamp(annee,1,anneesTotales);
return depart - (depart - cible) * Math.log(a + 1) / Math.log(anneesTotales + 1);
}

/**
* Projection logarithmique de la détente (croissant)
* depart : détente de départ (ex: 85cm)
* cible : détente cible (ex: 110cm)
*/
function projectDetenteLog(depart, cible, anneesTotales, annee){
if(annee<=0) return depart;
const a=clamp(annee,1,anneesTotales);
return depart + (cible - depart) * Math.log(a + 1) / Math.log(anneesTotales + 1);
}

/**
* Retourne le macrocycle de base avec les objectifs sprint/détente
* recalculés dynamiquement à partir du premier test enregistré.
* Si aucun test : valeurs par défaut du macrocycle.
*/
function getProjectedMacro(yr){
const base = getMacro(yr);
const tests = S.tests;

// Trouver le premier test avec au moins une mesure sprint ou détente
const firstWithSprint = tests.find(t=>t.sprint100m);
const firstWithDet = tests.find(t=>t.detente);

if(!firstWithSprint && !firstWithDet) return base;

const or = P.objectifsRealistes;
const anneesTotales = or.anneesProgression; // 8

// Calcul de l'année relative au premier test
// L'année du premier test est l'année de départ
const debutAnnee = firstWithSprint ? (firstWithSprint.annee||1) : (firstWithDet ? (firstWithDet.annee||1) : 1);
const anneeRelative = Math.max(1, yr - debutAnnee + 1);

const result = {...base};

// Sprint : si le macrocycle d'origine a une valeur sprint
if(base.sprint !== null && firstWithSprint){
const departSprint = firstWithSprint.sprint100m;
const projetSprint = projectSprintLog(departSprint, or.sprint100m_cible, anneesTotales, anneeRelative);
result.sprint = Math.round(projetSprint * 100) / 100;
// Reconstruire sL lisible
const s = result.sprint;
if(s > 11.2) result.sL = `< ${s.toFixed(2)} s`;
else if(s > 10.5) result.sL = `< ${s.toFixed(2)} s`;
else result.sL = `${s.toFixed(2)} s`;
}

// Détente : si le macrocycle d'origine a une valeur det
if(base.det !== null && firstWithDet){
const departDet = firstWithDet.detente;
const projetDet = projectDetenteLog(departDet, or.detente_cible, anneesTotales, anneeRelative);
result.det = Math.round(projetDet);
result.dL = `> ${result.det} cm`;
}

return result;
}

function sncMoy7(){
const d=S.sncData.slice(-7);
if(!d.length)return null;
return d.map(x=>(x.s1+x.s2+x.s3)/3).reduce((a,b)=>a+b,0)/d.length;

function sncToday(){ const d=S.sncData.find(x=>x.date===td());return d?(d.s1+d.s2+d.s3)/3:null; }
function sncStatus(){
const moy=sncMoy7(),tv=sncToday();
if(!moy||!tv)return{st:'unknown',ratio:null,moy,tv};
const r=tv/moy;
return{st:r>=0.90?'ok':r>=0.85?'warn':'bad',ratio:r,moy,tv};
}
function sleepToday(){ const d=S.sncData.find(x=>x.date===td());return d?d.sleep:null; }
function seanceAutorisee(){
const snc=sncStatus();const slp=sleepToday();const reasons=[];
if(snc.st==='bad')reasons.push('SNC < 90% moyenne 7j');
if(slp!==null&&slp<7.5)reasons.push(`Sommeil ${slp}h < seuil 7h30`);
return{ok:reasons.length===0,reasons};
}

function calcNutritionJour(poids, intensite, sw){
const isDecharge = sw===8;
const isBasse = intensite==='basse'||intensite==='repos';
const isHaute = intensite==='haute';
const prot = isDecharge ? poids*2.0 : (sw<=5 ? poids*2.2 : poids*2.0);
let glucMin, glucMax;
if(isDecharge||isBasse){ glucMin=3.0; glucMax=4.0; }
else if(isHaute){ glucMin=5.0; glucMax=6.0; }
else { glucMin=4.0; glucMax=5.0; }
const gluc = poids*(glucMin+glucMax)/2;
const lip = poids*1.1;
const kcal = Math.round(prot*4 + gluc*4 + lip*9);
return{prot:Math.round(prot), gluc:Math.round(gluc), lip:Math.round(lip), kcal,
glucRange:`${glucMin}–${glucMax}g/kg`,
phase: isDecharge?'Décharge':isBasse?'Repos actif':isHaute?'Haute intensité':'Modéré'};
}

const poids=S.profil.poids||65;

const n=calcNutritionJour(poids,seanceDuJour.int,sw);
return`<div class="nutri-widget">

async function saveToCloud(){
const keyEl=document.getElementById('jsonbin-key');
const binEl=document.getElementById('jsonbin-binid');
const apiKey=keyEl?keyEl.value.trim():S.cloudKey;
const binId=binEl?binEl.value.trim():S.cloudBinId;
if(!apiKey||!binId){ notify('⚠️ Remplis la clé API et le Bin ID JSONBin','warn'); return; }
S.cloudKey=apiKey; S.cloudBinId=binId; save();
const data={profil:S.profil,yr:S.yr,wk:S.wk,sncData:S.sncData,sessions:S.sessions,tests:S.tests,suggestions:S.suggestions,coachMsgs:S.coachMsgs,exportDate:new Date().toISOString(),version:'6.1'};
const statusEl=document.getElementById('cloud-status');
if(statusEl){statusEl.textContent='⏳ Synchronisation en cours...';statusEl.style.color='var(--text2)';}
try{
const res=await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':apiKey},body:JSON.stringify(data)});
if(!res.ok) throw new Error('HTTP '+res.status);
S.lastExport=new Date().toISOString(); save();
if(statusEl){statusEl.textContent='✅ Sauvegardé sur JSONBin !';statusEl.style.color='var(--green)';}
checkExportBadge(); updateCloudPopupInfo();
notify('☁️ Données sauvegardées sur le cloud !','success');

}catch(e){
if(statusEl){statusEl.textContent='❌ Erreur : '+e.message;statusEl.style.color='var(--red)';}
notify('❌ Échec cloud : '+e.message,'error');
exportDataCloud();
notify('📤 Export JSON local effectué en fallback','warn');
}
}

function saveSNC(){
const s1=parseFloat(document.getElementById('snc1').value);
const s2=parseFloat(document.getElementById('snc2').value);
const s3=parseFloat(document.getElementById('snc3').value);
const slp=parseFloat(document.getElementById('sleep-h').value);
if(isNaN(s1)||isNaN(s2)||isNaN(s3)){notify('⚠️ Remplis les 3 sauts !','warn');return;}
S.sncData=S.sncData.filter(d=>d.date!==td());
S.sncData.push({date:td(),s1,s2,s3,sleep:isNaN(slp)?null:slp});
if(S.sncData.length>60)S.sncData.shift();
save();
const m7=sncMoy7(),avg=(s1+s2+s3)/3,ratio=m7?avg/m7:1;
let msg='',type='ok';
if(ratio<0.90){type='bad';msg=`SNC à ${(ratio*100).toFixed(0)}% de la moyenne 7 jours. Seuil 90% non atteint. Séance nerveuse annulée.`;}
else if(ratio<0.95){type='warn';msg=`SNC légèrement bas à ${(ratio*100).toFixed(0)}%. Volume sprint réduit automatiquement. Reste vigilant Nadhir.`;}
else{msg=`SNC nominal à ${(ratio*100).toFixed(0)}%. Nadhir, tu es prêt à performer aujourd'hui !`;}
if(!isNaN(slp)&&slp<7.5){msg+=` Sommeil insuffisant à ${slp}h.`;type='bad';}
addCoachMsg(msg,type==='bad'?'alert':type==='warn'?'warn':'ok');
document.getElementById('snc-result').innerHTML=`<div style="color:${type==='bad'?'var(--red)':type==='warn'?'var(--amber)':'var(--green)'};font-weight:600;margin-bottom:4px;">Moy: ${avg.toFixed(1)} cm | Moy 7j: ${m7?m7.toFixed(1):'—'} cm | Ratio: ${(ratio*100).toFixed(0)}%</div><div style="font-size:10px;line-height:1.6;">${msg}</div>`;
updateSNCWidget();
notify(type==='bad'?'🚫 Séance nerveuse annulée':'✅ Test SNC enregistré',type==='bad'?'error':'success');
if(S.profil.voix) speakSNCReport(ratio,slp,m7);
}

function speakSNCReport(ratio, slp, m7){
if(!S.profil.voix) return;
const sw=meso();
const hivernal=isHivernal();
const semaine=hivernal?P.semainetypeHivernal:P.semainetype;
const dayOfWeek=(new Date().getDay()||7)-1;
const seance=semaine[Math.min(dayOfWeek,6)];
let msg=`Bonjour Nadhir. SNC à ${Math.round(ratio*100)} pourcent de ta moyenne 7 jours. `;
if(ratio<0.90){
msg+='Séance haute intensité annulée. Remplacée par mobilité et marche.';
} else {
msg+=`Programme du jour : ${seance.type}. `;
const sprintEx=seance.ex.filter(e=>e.cat==='sprint');
if(sprintEx.length){
const adj=adjustSprintExercice(sprintEx[0],sw,ratio);
if(adj) msg+=`Sprint : ${adj.consigne}. `;
}
const squatEx=seance.ex.find(e=>e.chargeKey==='squat');
if(squatEx){ const charge=calcCharge('squat',sw); msg+=`Squat : ${charge} kilogrammes. `; }
if(sw===8) msg+='Semaine de décharge : volume réduit obligatoire.';
else if(ratio>=1.00) msg+='SNC au top ! Force maximale autorisée.';
else if(ratio<0.95) msg+='Volume légèrement réduit pour préserver ta récupération.';
}
if(slp&&slp<7.5) msg+=` Attention : sommeil à ${slp} heures seulement.`;
speak(msg);
}

function updateSNCWidget(){
const tv=sncToday(),m7=sncMoy7();
const el=document.getElementById('snc-display'),w=document.getElementById('snc-widget');
w.className='';

el.textContent=tv.toFixed(0)+' cm';
const r=m7?tv/m7:1;
if(r>=0.90) w.classList.add('snc-ok');
else if(r>=0.85) w.classList.add('snc-warn');
else w.classList.add('snc-bad');
}else{
el.textContent='—';
}
}

function speak(txt){
if(!S.profil.voix) return;
if(!('speechSynthesis' in window)||!txt) return;
window.speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(txt);
u.lang='fr-FR'; u.rate=1.0; u.pitch=1.0; u.volume=1.0;
const voices=window.speechSynthesis.getVoices();
const frVoice=voices.find(v=>v.lang.startsWith('fr'));
if(frVoice) u.voice=frVoice;
window.speechSynthesis.speak(u);
}
if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged=function(){}; }

function analyzeProgression(){
// MODIFICATION 3 : utilise getProjectedMacro
const macro=getProjectedMacro(S.yr),tests=S.tests,last=tests.length?tests[tests.length-1]:null,prev=tests.length>1?tests[tests.length-2]:null;
if(!last)return[];
const msgs=[];
if(last.sprint100m){
const d=last.sprint100m-(macro.sprint||11.5);
if(d>0.3){ msgs.push(`⚠️ Nadhir, ton 100m (${last.sprint100m}s) est en retard de ${d.toFixed(2)}s sur l'objectif Année ${S.yr}.`); addSuggestion('sprint_vol','+Volume Sprint','Augmenter de 1 répétition par séance Vmax pendant 4 semaines.');}
else if(d<0){ msgs.push(`🔥 100m ${last.sprint100m}s — objectif dépassé ! Excellente trajectoire !`); }
else{ msgs.push(`✅ 100m ${last.sprint100m}s dans la cible (${macro.sL}).`); }
if(prev&&prev.sprint100m&&Math.abs(last.sprint100m-prev.sprint100m)<0.05){ msgs.push(`💡 Plateau 100m détecté. Varier la spécificité ou ajouter une séance technique départs.`); addSuggestion('sprint_tech','Séance technique départs','Ajouter 1 séance départs 10m chaque mercredi (basse intensité).'); }
}
if(last.detente){
if(last.detente<(macro.det||95)-5){ msgs.push(`⚠️ Détente ${last.detente}cm en retard vs objectif ${macro.det}cm.`); addSuggestion('drop_jump','Progression Drop Jumps',`Passer drop jumps à ${S.yr<5?'40':'50'} cm dès la prochaine séance.`); }
else if(last.detente>=(macro.det||95)){ msgs.push(`🚀 Détente ${last.detente}cm — objectif annuel atteint !`); }
}
if(last.curl3rm){
const curl=last.curl3rm;
if(curl<(S.profil.curl3RM||0)+2) msgs.push(`💡 Curl 3RM stagne à ${curl}kg. Progresser de 1,25kg/séance recommandé.`);
else msgs.push(`✅ Curl 3RM ${curl}kg — progression BD sur la bonne voie !`);
}
if(last.prehension&&last.prehension<50){ msgs.push(`⚠️ Force de préhension à ${last.prehension}kg. Objectif : >55kg avant défi frère.`); addSuggestion('prehension','Renforcement préhension','Ajouter pinch grip 3×30s après chaque séance BD.'); }
if(last.brasDefer==='Défaite'||last.brasDefer==='défaite'){
msgs.push(`💪 Bras de fer : défaite. Focus sur le prochain bloc hivernal !`);
if(prev&&(prev.brasDefer==='Défaite'||prev.brasDefer==='défaite')){ addSuggestion('bd_anticipe','Anticiper bloc hivernal','2 défaites consécutives. Recommandé : démarrer bloc hivernal BD immédiatement.'); }
}
msgs.forEach(m=>addCoachMsg(m));
save();
return msgs;
}

let timerInt=null,timerTot=0,timerRem=0;

updateTimerUI();
},1000);
}
function updateTimerUI(){
const pf=timerTot>0?(timerRem/timerTot)*100:0;
document.getElementById('timer-num').textContent=fmtTime(timerRem);
document.getElementById('timer-pf').style.width=pf+'%';
const col=pf>50?'var(--green)':pf>20?'var(--amber)':'var(--red)';
document.getElementById('timer-num').style.color=col;
}
function addTime(d){timerRem=Math.max(0,timerRem+d);timerTot=Math.max(timerTot,timerRem);updateTimerUI();}
function closeTimer(){if(timerInt)clearInterval(timerInt);document.getElementById('timer-overlay').classList.remove('show');}
function beep(){
try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=880;g.gain.setValueAtTime(0.25,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.7);o.start();o.stop(ac.currentTime+0.7);}catch(e){}
}

// TAB: VISION — avec Stats Rapides (modif 2) + Projections log (modif 3)
// ═══════════════════════════════════════════════════════════════
function renderVision(){
// MODIFICATION 3 : utilise getProjectedMacro à la place de currMacro
const macro=getProjectedMacro(S.yr);
const tests=S.tests;
const last=tests.length?tests[tests.length-1]:null;
const age=getAge(S.yr);
const yearPct=((S.wk-1)/52)*100;
const sa=seanceAutorisee();
const snc=sncStatus();
const sw=meso();
const hivernal=isHivernal();
const phase=getMesoLabel(sw);
const lastSprint=last?last.sprint100m:null;
const lastDet=last?last.detente:null;

// Objectifs finaux et progression
const sprintFinalTarget=10.00;
const detFinalTarget=120;
const sprintProgFinal=lastSprint?Math.max(0,Math.min(100,(1-(lastSprint-sprintFinalTarget)/(12.65-sprintFinalTarget))*100)):0;
const detProgFinal=lastDet?Math.max(0,Math.min(100,(lastDet/detFinalTarget)*100)):0;
const sprintStart=lastSprint||12.65;
const macroSprint=macro.sprint||11.5;
const sprintProgAnnee=lastSprint&&macroSprint?Math.max(0,Math.min(100,(1-(lastSprint-macroSprint)/(12.65-macroSprint))*100)):0;

function linReg(pts){const n=pts.length;if(n<2)return null;const mx=pts.reduce((a,b)=>a+b.x,0)/n;const my=pts.reduce((a,b)=>a+b.y,0)/n;const num=pts.reduce((a,b)=>a+(b.x-mx)*(b.y-my),0);const den=pts.reduce((a,b)=>a+(b.x-mx)**2,0);if(den===0)return null;const slope=num/den;const intercept=my-slope*mx;return{slope,intercept};}
function projectSprint(){const sp=tests.filter(t=>t.sprint100m&&t.annee).map(t=>({x:t.annee,y:t.sprint100m}));if(sp.length<2)return null;const reg=linReg(sp);if(!reg||reg.slope>=0)return null;const targetYr=(sprintFinalTarget-reg.intercept)/reg.slope;return Math.ceil(Math.min(15,Math.max(S.yr,targetYr)));}
function projectDetente(){const dt=tests.filter(t=>t.detente&&t.annee).map(t=>({x:t.annee,y:t.detente}));if(dt.length<2)return null;const reg=linReg(dt);if(!reg||reg.slope<=0)return null;const targetYr=(detFinalTarget-reg.intercept)/reg.slope;return Math.ceil(Math.min(15,Math.max(S.yr,targetYr)));}
function fallbackSprintEst(){if(!lastSprint||lastSprint<=sprintFinalTarget)return null;return Math.min(15,Math.ceil(S.yr+(lastSprint-sprintFinalTarget)/0.15));}
function fallbackDetEst(){if(!lastDet||lastDet>=detFinalTarget)return null;return Math.min(15,Math.ceil(S.yr+(detFinalTarget-lastDet)/4));}

const sprintTestCount=tests.filter(t=>t.sprint100m).length;
const detTestCount=tests.filter(t=>t.detente).length;
const sprintEstYear=projectSprint()||fallbackSprintEst();
const detEstYear=projectDetente()||fallbackDetEst();

const dayOfWeek=(new Date().getDay()||7)-1;
const semaine=hivernal?P.semainetypeHivernal:P.semainetype;
const seanceDuJour=semaine[Math.min(dayOfWeek,6)];
const jourNom=JOURS_FR[new Date().getDay()];

let sncLabel='Non testé';
let sncColor='var(--text3)';
if(snc.st==='ok'){sncLabel=`✅ Nominal (${(snc.ratio*100).toFixed(0)}%)`;sncColor='var(--green)';}
else if(snc.st==='warn'){sncLabel=`⚡ Bas (${(snc.ratio*100).toFixed(0)}%)`;sncColor='var(--amber)';}
else if(snc.st==='bad'){sncLabel=`🚫 Trop bas (${(snc.ratio*100).toFixed(0)}%)`;sncColor='var(--red)';}

const today_sessions_count=()=>{const k=`${S.yr}_w${S.wk}`;const log=S.sessions[k]||{};return Object.keys(log).length;};

const dotTypes=['prep','prep','charge','charge','charge','pic','pic','dech'];
const mesoDotsHtml=dotTypes.map((ph,i)=>{const num=i+1;const isCur=num===sw;return`<div class="meso-dot ${ph} ${isCur?'current':''}" title="Sem. ${num}">${num}</div>`;}).join('');

// Info projection logarithmique
const hasFirstTest=tests.find(t=>t.sprint100m||t.detente);
const projInfoHtml=hasFirstTest?`<div style="font-size:9px;color:var(--blue);text-align:center;margin-top:4px;">📐 Objectifs recalculés via projection logarithmique depuis ton 1er test</div>`:'';

let html='';
html+=renderNutritionWidgetHTML();

html+=`<div class="daily-card ${!sa.ok?'cancelled':''}">
<div class="daily-greeting">BONJOUR</div>
<div class="daily-day">${jourNom.toUpperCase()}</div>
<div class="daily-seance">${!sa.ok?'<span style="color:var(--red)">🚫 Séance annulée</span>':seanceDuJour.emoji+' '+seanceDuJour.type+' — '+seanceDuJour.titre}</div>
<div class="daily-snc" style="color:${sncColor};">SNC : ${sncLabel}</div>
${!sa.ok?`<div class="daily-alert">→ Mobilité + Marche 20 min<br><small style="color:var(--text3);">Raison : ${sa.reasons.join(' • ')}</small></div>`:''}
${hivernal?`<div class="daily-info">❄️ Bloc hivernal optimisé v6 — Sprint Vmax + BD + Plio maintenu</div>`:''}
${sw===8&&sa.ok?`<div class="daily-info">⚡ Semaine de décharge — Volume réduit obligatoire</div>`:''}
</div>`;

// ── MODIFICATION 2 : Carte Stats Rapides ──
html+=`<div class="quick-stats-card">
<div class="quick-stats-title">⚡ STATS RAPIDES</div>
<div class="quick-stats-grid">
<div class="quick-stat-item">
<span class="quick-stat-lbl">POIDS (kg)</span>
<input class="quick-stat-inp" type="number" id="q_poids" value="${S.profil.poids||65}" step="0.1" min="40" max="200">
</div>

function renderSNCHistory(){
const last7=S.sncData.slice(-7);if(!last7.length)return'';
const avg7=last7.map(d=>(d.s1+d.s2+d.s3)/3);
const gMax=Math.max(...avg7)+5,gMin=Math.min(...avg7)-5;
const W=260,H=60,p=8;
const pts=avg7.map((v,i)=>{const x=p+(i/(avg7.length-1||1))*(W-p*2);const y=H-p-((v-gMin)/(gMax-gMin||1))*(H-p*2);return`${x},${y}`;}).join(' ');
return`<div style="margin-top:8px;font-size:10px;color:var(--text3);margin-bottom:4px;">Historique 7 jours (cm)</div>
<svg width="${W}" height="${H}" class="chart-svg"><polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="2" stroke-linejoin="round"/>${avg7.map((v,i)=>{const x=p+(i/(avg7.length-1||1))*(W-p*2);const y=H-p-((v-gMin)/(gMax-gMin||1))*(H-p*2);return`<circle cx="${x}" cy="${y}" r="3" fill="var(--green)"/><text x="${x}" y="${y-5}" text-anchor="middle" fill="var(--green)" font-size="8">${v.toFixed(0)}</text>`;}).join('')}</svg>`;
}

function renderMiniChart(data,label,color,invert=false){
if(data.length<2)return'';
const W=270,H=65,p=10;
const vals=data.map(d=>d.v);
const mn=Math.min(...vals)-2,mx=Math.max(...vals)+2;
const pts=data.map((d,i)=>{const x=p+(i/(data.length-1))*(W-p*2);const y=invert?p+((d.v-mn)/(mx-mn||1))*(H-p*2):H-p-((d.v-mn)/(mx-mn||1))*(H-p*2);return`${x},${y}`;}).join(' ');
const clr={'g':'var(--green)','a':'var(--amber)','b':'var(--blue)','r':'var(--red)','p':'var(--purple)'}[color]||'var(--green)';
return`<div style="margin-bottom:14px;"><div style="font-size:10px;color:var(--text2);margin-bottom:4px;">${label}</div>
<div class="chart-wrap"><svg width="${W}" height="${H}" class="chart-svg">
<defs><linearGradient id="cg${color}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${clr}" stop-opacity=".2"/><stop offset="100%" stop-color="${clr}" stop-opacity="0"/></linearGradient></defs>
<polygon points="${pts} ${p+(data.length-1)/(data.length-1)*(W-p*2)+p},${H-p} ${p},${H-p}" fill="url(#cg${color})"/>
<polyline points="${pts}" fill="none" stroke="${clr}" stroke-width="2" stroke-linejoin="round"/>
${data.map((d,i)=>{const x=p+(i/(data.length-1))*(W-p*2);const y=invert?p+((d.v-mn)/(mx-mn||1))*(H-p*2):H-p-((d.v-mn)/(mx-mn||1))*(H-p*2);return`<circle cx="${x}" cy="${y}" r="3" fill="${clr}"/><text x="${x}" y="${y-6}" text-anchor="middle" fill="${clr}" font-size="8">${d.v}</text>`;}).join('')}
</svg></div></div>`;
}

function saveTest(){

P.tests.forEach(t=>{

entry[t.id]=t.id==='brasDefer'?el.value:parseFloat(el.value);
});
if(Object.keys(entry).length<=3){notify('⚠️ Remplis au moins un résultat','warn');return;}
S.tests.push(entry);
if(entry.squat1rm) S.profil.squat1RM=Math.round(entry.squat1rm);
if(entry.tractionMax) S.profil.tractionMax=Math.round(entry.tractionMax);
if(entry.curl3rm) S.profil.curl3RM=Math.round(entry.curl3rm);
if(entry.prehension) S.profil.prehension=Math.round(entry.prehension);
save();
const msgs=analyzeProgression();
notify('📊 Test enregistré ! Analyse IA lancée…','success');
setTimeout(()=>{if(S.coachMsgs.length>0&&S.profil.voix)speak(S.coachMsgs[0].txt);},600);

}

<div class="card"><div class="card-title">👤 PROFIL ATHLÈTE</div>
<div class="inp-row">
<div class="ig"><label class="il">Âge (ans)</label><input class="inp" type="number" id="p_age" value="${p.age}"></div>
<div class="ig"><label class="il">Poids (kg)</label><input class="inp" type="number" id="p_poids" value="${p.poids}" step="0.1"></div>
</div>
<div class="inp-row">
<div class="ig"><label class="il">Taille (cm)</label><input class="inp" type="number" id="p_taille" value="${p.taille||175}"></div>
<div class="ig"><label class="il">% Masse grasse</label><input class="inp" type="number" id="p_bf" value="${p.BF||12}" step="0.1"></div>
</div>
<button class="btn btn-g btn-full" style="margin-top:4px;" onclick="saveProfil()">💾 Sauvegarder profil</button>
</div>

<div class="card"><div class="card-title">💪 1RM & PROGRESSION</div>
<div class="inp-row">
<div class="ig"><label class="il">Squat 1RM (kg)</label><input class="inp" type="number" id="p_sq" value="${p.squat1RM}"></div>
<div class="ig"><label class="il">RDL 1RM (kg)</label><input class="inp" type="number" id="p_rdl" value="${p.rdl1RM||85}"></div>
</div>
<div class="inp-row">
<div class="ig"><label class="il">Lest tractions base (kg)</label><input class="inp" type="number" id="p_tr" value="${p.tractionMax||0}"></div>
<div class="ig"><label class="il">Curl marteau 3RM (kg)</label><input class="inp" type="number" id="p_curl" value="${p.curl3RM||20}"></div>
</div>
<div class="inp-row">
<div class="ig"><label class="il">Préhension (kg)</label><input class="inp" type="number" id="p_preh" value="${p.prehension||40}"></div>
<div class="ig"><label class="il">Année en cours</label><input class="inp" type="number" id="p_yr" value="${S.yr}" min="1" max="15"></div>
</div>
<div class="ig"><label class="il">Semaine en cours</label><input class="inp" type="number" id="p_wk" value="${S.wk}" min="1" max="52"></div>
<div style="font-size:10px;color:var(--text3);margin-bottom:10px;">ℹ️ Tractions : sem.${meso()} = base+${meso()-1}kg = <strong style="color:var(--amber)">${(p.tractionMax||0)+(meso()-1)} kg</strong></div>
<button class="btn btn-a btn-full" style="margin-top:4px;" onclick="saveRM()">💾 Sauvegarder 1RM & position</button>
</div>

<div class="card"><div class="card-title">⚙️ PARAMÈTRES</div>
<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
<div><div style="font-size:13px;font-weight:600;">🔊 Voix du coach</div><div style="font-size:10px;color:var(--text3);">Lecture audio des recommandations IA</div><div style="font-size:9px;color:${voixOn?'var(--green)':'var(--text4)'};margin-top:3px;font-weight:700;">${voixOn?'● ACTIVÉE':'● DÉSACTIVÉE'}</div></div>
<div class="toggle-track ${voixOn?'on':'off'}" id="toggle-voix" onclick="toggleVoix()"><div class="toggle-knob"></div></div>
</div>
<div style="padding:10px 0;">
<div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;">📐 Projection logarithmique</div>
<div style="font-size:10px;color:var(--text3);line-height:1.6;">Cible sprint : <strong style="color:var(--green)">${P.objectifsRealistes.sprint100m_cible}s</strong> · Cible détente : <strong style="color:var(--amber)">${P.objectifsRealistes.detente_cible}cm</strong> · Durée : <strong>${P.objectifsRealistes.anneesProgression} ans</strong><br>Les objectifs annuels sont recalculés automatiquement depuis le 1er test enregistré.</div>
</div>
</div>

<div class="card"><div class="card-title">☁️ SAUVEGARDE & CLOUD</div>
<div style="font-size:11px;color:var(--text2);margin-bottom:10px;">${daysSinceExport!==null?`Dernière sauvegarde : il y a <strong style="color:${daysSinceExport>7?'var(--red)':'var(--green)'}">${daysSinceExport} jours</strong>`:'Aucune sauvegarde enregistrée'}</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
<button class="btn btn-b" onclick="exportDataCloud()">📤 Exporter JSON</button>
<button class="btn btn-o" onclick="document.getElementById('imp-file').click()">📥 Importer JSON</button>
<input type="file" id="imp-file" style="display:none" accept=".json" onchange="importData(this)">
</div>
<div style="font-size:10px;color:var(--text3);margin-bottom:8px;">☁️ Synchronisation cloud via JSONBin : utilise le bouton ☁️ Sync en haut de l'écran</div>
<button class="btn btn-o" style="border-color:rgba(255,82,82,.3);color:var(--red);" onclick="confirmReset()">🗑 Réinitialiser toutes les données</button>
</div>

<div style="text-align:center;padding:20px;color:var(--text3);font-size:10px;letter-spacing:1px;">
PROTOCOLE NADHIR v6.1 — 15 ANS<br>
Objectif : 100m 10,00s · Détente 120cm · BD vs frère 120kg<br>
<span style="color:var(--blue);font-size:9px;">Bloc hivernal optimisé · Stats rapides · Projection logarithmique · Dévalidation séance</span>
</div>`;
}

function saveProfil(){
S.profil.age=parseInt(document.getElementById('p_age').value)||S.profil.age;
S.profil.poids=parseFloat(document.getElementById('p_poids').value)||S.profil.poids;
S.profil.taille=parseInt(document.getElementById('p_taille').value)||S.profil.taille;
S.profil.BF=parseFloat(document.getElementById('p_bf').value)||S.profil.BF;
save();notify('✅ Profil sauvegardé','success');
}

function saveRM(){
S.profil.squat1RM=parseInt(document.getElementById('p_sq').value)||S.profil.squat1RM;
S.profil.rdl1RM=parseInt(document.getElementById('p_rdl').value)||S.profil.rdl1RM;
S.profil.tractionMax=parseInt(document.getElementById('p_tr').value)||0;
S.profil.curl3RM=parseFloat(document.getElementById('p_curl').value)||S.profil.curl3RM||20;
S.profil.prehension=parseFloat(document.getElementById('p_preh').value)||S.profil.prehension||40;
S.yr=clamp(parseInt(document.getElementById('p_yr').value)||S.yr,1,15);
S.wk=clamp(parseInt(document.getElementById('p_wk').value)||S.wk,1,52);
save();notify('✅ 1RM et position sauvegardés','success');
}

function toggleVoix(){
S.profil.voix=!S.profil.voix;save();
renderProfil();
notify(S.profil.voix?'🔊 Voix activée':'🔇 Voix désactivée','info');
if(S.profil.voix)speak('Voix du coach activée. Bonjour Nadhir !');
}

function importData(input){
const file=input.files[0];if(!file)return;
const r=new FileReader();
r.onload=(e)=>{
try{
const d=JSON.parse(e.target.result);
if(d.profil)S.profil={...S.profil,...d.profil};if(d.yr)S.yr=d.yr;if(d.wk)S.wk=d.wk;
if(d.sncData)S.sncData=d.sncData;if(d.sessions)S.sessions=d.sessions;
if(d.tests)S.tests=d.tests;if(d.suggestions)S.suggestions=d.suggestions;
if(d.coachMsgs)S.coachMsgs=d.coachMsgs;
save();updateSNCWidget();
({vision:renderVision,plan:renderPlan,training:renderTraining,coach:renderCoach,tests:renderTests,profil:renderProfil}[curTab])();
notify('✅ Données importées','success');
}catch(err){notify('❌ Erreur JSON — fichier invalide','error');}
};
r.readAsText(file);
}

function confirmReset(){
openModal('⚠️ RÉINITIALISER TOUTES LES DONNÉES',`<p style="color:var(--text2);margin-bottom:16px;font-size:12px;">Cette action efface TOUTES les données. Irréversible.</p><div style="display:flex;gap:8px;"><button class="btn btn-o btn-full" onclick="closeModal()">Annuler</button><button class="btn btn-r btn-full" onclick="resetAll()">🗑 Tout effacer</button></div>`);
}
function resetAll(){
localStorage.clear();
S={yr:1,wk:1,profil:{age:22,poids:65,taille:175,BF:12,squat1RM:100,rdl1RM:85,tractionMax:0,curl3RM:20,prehension:40,startDate:td(),voix:false},sncData:[],sessions:{},tests:[],suggestions:[],coachMsgs:[],lastExport:null,cloudKey:'',cloudBinId:''};
save();closeModal();
({vision:renderVision,plan:renderPlan,training:renderTraining,coach:renderCoach,tests:renderTests,profil:renderProfil}[curTab])();
notify('🔄 Données réinitialisées','warn');
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('click',e=>{
if(!e.target.closest('#snc-popup')&&!e.target.closest('#snc-widget'))closeSNCPopup();
if(!e.target.closest('#cloud-popup')&&!e.target.closest('#cloud-btn'))closeCloudPopup();
});

updateSNCWidget();
checkExportBadge();
renderVision();

setTimeout(()=>{
if(S.tests.length)analyzeProgression();
if(!sncToday()){
setTimeout(()=>notify('☀️ Nadhir, effectue ton test SNC matinal (haut droite) !','info'),1000);
}
if(S.lastExport){
const days=Math.floor((Date.now()-new Date(S.lastExport).getTime())/(1000*60*60*24));
if(days>7) setTimeout(()=>notify(`☁️ Dernière sauvegarde il y a ${days} jours — pense à synchroniser !`,'warn'),2500);
}
},400);
</script>
</body>
</html>
